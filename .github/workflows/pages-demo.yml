name: Deploy Demo To GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Determine base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          USER_PAGES_REPO="${GITHUB_REPOSITORY_OWNER}.github.io"

          if [ "$REPO_NAME" = "$USER_PAGES_REPO" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build static demo
        env:
          DEMO_STATIC_EXPORT: 'true'
          NEXT_PUBLIC_APP_MODE: demo
          NEXT_PUBLIC_API_URL: https://demo.invalid
        run: NEXT_PUBLIC_BASE_PATH="$BASE_PATH" npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
